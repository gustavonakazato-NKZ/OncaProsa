    // Evita o erro de "App already exists" quando a página recarrega sozinha
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore(); 
    const auth = firebase.auth(); 
    
    let appSecundario;
    try {
        appSecundario = firebase.app("AppSecundario");
    } catch (e) {

    let lancamentos = [], produtos = [], produtosFinais = [], clientes = [], fornecedores = [], historicoClientes = [], usuariosLista = [], vendas = [];

    let statusLista = ["A Vencer", "Efetuada"]; 
    let categorias = ["Vendas de Produtos", "Receita de Serviços", "Devoluções/Cancelamentos", "Impostos de Venda", "Taxa de Cartão", "Comissões", "Mercadorias", "Insumos de Produção", "Aluguel", "Salários", "Internet", "Sistema", "Contador", "Outras Despesas Fixas"];
    
    let userAutenticado = null; 
    let perfilUsuario = 'Vendedor'; 
    let carrinhoAtual = []; 
    let fichaAtual = [];

    // --- 3. SISTEMA DE LOGS ---
    function registrarLog(acao, detalhes) { 
        if(!userAutenticado) return; 
        let nomeLog = document.getElementById('lblUsuario').innerText || "Usuário Desconhecido"; 
        db.collection("logs").add({ dataHora: new Date().toISOString(), usuario: nomeLog, acao: acao, detalhes: detalhes }).catch(e => console.error(e)); 
    }

    db.collection("usuarios").limit(1).get().then(snap => { 
        if(snap.empty) { 
            document.getElementById('btnRegistrarPrimeiro').style.display = 'block'; 
            document.getElementById('loginMsg').innerText = "Banco de dados zerado. Crie o Administrador Mestre."; 
            document.getElementById('loginMsg').style.color = "#27ae60"; 
        } 
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('telaLogin').style.display = 'none'; 
            document.getElementById('appLogado').style.display = 'block'; 
            userAutenticado = user;
            
            db.collection("usuarios").doc(user.uid).onSnapshot(doc => {
                if (doc.exists) {
                    let d = doc.data(); 
                    if(d.status === "Suspenso") { 
                        alert("Sua conta foi suspensa pelo Administrador."); 
                        auth.signOut(); 
                        return; 
                    }
                    perfilUsuario = d.perfil; 
                    document.getElementById('lblUsuario').innerText = d.nome || "Usuário"; 
                    document.getElementById('lblPerfil').innerText = perfilUsuario;
                    document.getElementById("fMes").value = new Date().toISOString().substring(0,7); 
                    document.getElementById("dreMes").value = new Date().toISOString().substring(0,7); 
                    document.getElementById("fMesVenda").value = new Date().toISOString().substring(0,7);
                    
                    aplicarPermissoes(); 
                    carregarListas(); 
                    iniciarOuvintesDeDados();
                }
            });
        } else { 
            document.getElementById('telaLogin').style.display = 'flex'; 
            document.getElementById('appLogado').style.display = 'none'; 
            userAutenticado = null; 
        }
    });

    // --- 4. FUNÇÃO DE LOGIN COM DIAGNÓSTICO ---
    function entrar() { 
        let cpf = document.getElementById('cpfAuth').value.replace(/\D/g, ''); 
        const s = document.getElementById('senhaAuth').value; 
        
        if(!cpf || !s) return alert("Preencha CPF e Senha"); 
        
        document.getElementById('loginMsg').innerText = "Autenticando..."; 
        document.getElementById('loginMsg').style.color = "#4a3022";
        
        auth.signInWithEmailAndPassword(cpf + "@oncaprosa.local", s)
            .catch(err => { 
                console.error("Erro Firebase:", err.code, err.message); // Imprime no console (F12) o erro real
                
                let msg = "Erro no acesso. CPF ou Senha incorretos.";
                
                // Tradutor de erros para facilitar a nossa vida
                if(err.code === 'auth/user-not-found') msg = "Usuário não encontrado. O CPF está certo?";
                if(err.code === 'auth/wrong-password') msg = "Senha incorreta.";
                if(err.code === 'auth/network-request-failed') msg = "Sem conexão com a internet.";
                if(err.code === 'auth/too-many-requests') msg = "Muitas tentativas. Aguarde um minuto.";
                
                document.getElementById('loginMsg').innerText = msg; 
                document.getElementById('loginMsg').style.color = "#e74c3c"; 
            }); 
    }
